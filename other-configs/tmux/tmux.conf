# Custom prefix (ctrl + a)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# No escape delay
set -sg escape-time 0

# Mouse
set -g mouse on

# vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Start window at 1
set -g base-index 1
setw -g pane-base-index 1

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Double <C-a> to zoom
bind C-a resize-pane -Z

# TokyoNight Storm colors
set -g status-style "bg=#1f2335,fg=#a9b1d6"
set -g window-status-current-style "bg=#292e42,fg=#7aa2f7,bold"
set -g window-status-style "bg=#1f2335,fg=#565f89"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#292e42,fg=#c0caf5"
